version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: kecap-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: kecap-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kecap
      POSTGRES_PASSWORD: kecap123
      POSTGRES_DB: kecap
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data:
